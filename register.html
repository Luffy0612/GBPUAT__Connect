<!DOCTYPE html>
<html lang="en">

<head>
<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | GBPUAT Connect</title>

<link rel="stylesheet" href="style.css">

<style>

/* STUDENT ACTIVE */

.student-active{

    background:
    linear-gradient(
        to right,
        #2563eb,
        #06b6d4
    ) !important;

    color:white !important;

    box-shadow:
    0 10px 25px rgba(37,99,235,0.35);

    transform:scale(1.02);
}

/* ALUMNI ACTIVE */

.alumni-active{

    background:
    linear-gradient(
        to right,
        #7c3aed,
        #a855f7
    ) !important;

    color:white !important;

    box-shadow:
    0 10px 25px rgba(124,58,237,0.35);

    transform:scale(1.02);
}
.field,
.profile-upload-container{
    position:relative;
    width:100%;
}

/* SAME HEIGHT */

.field input,
.field select,
.upload-box{

    width:100%;
    height:82px;

    border-radius:22px;

    background:#071226;

    border:1px solid rgba(255,255,255,0.06);

    padding:0 28px;

    color:white;

    font-size:17px;

    outline:none;

    transition:0.3s ease;
}

/* FIX LABEL */

.field label{

    position:absolute;

    left:28px;
    top:50%;

    transform:translateY(-50%);

    color:#94a3b8;

    font-size:16px;

    pointer-events:none;

    transition:0.3s ease;
}

/* FLOAT LABEL */

.field input:focus + label,
.field input:valid + label,
.field select:focus + label,
.field select:valid + label{

    top:14px;

    font-size:12px;

    color:#06b6d4;
}

/* HOVER */

.field input:focus,
.field select:focus,
.upload-box:hover{

    border-color:#06b6d4;

    box-shadow:
    0 0 20px rgba(6,182,212,0.15);
}
body{

    margin:0;

    padding:40px;

    font-family:'Poppins',sans-serif;

    background:
        radial-gradient(
            circle at top left,
            rgba(79,70,229,0.25),
            transparent 30%
        ),

        radial-gradient(
            circle at bottom right,
            rgba(6,182,212,0.22),
            transparent 30%
        ),

        #020617;

    color:white;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:flex-start;

    padding-top:40px;

    padding-bottom:40px;

    overflow-x:hidden;

    position:relative;
}

/* FLOATING GLOW BLOBS */

body::before,
body::after{

    content:"";

    position:fixed;

    width:420px;
    height:420px;

    border-radius:50%;

    filter:blur(120px);

    z-index:-1;

    animation:
        floatBlob 10s infinite ease-in-out;
}

body::before{

    background:#4f46e5;

    top:-120px;
    left:-120px;
}

body::after{

    background:#06b6d4;

    bottom:-120px;
    right:-120px;
}

@keyframes floatBlob{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(35px);
    }

    100%{
        transform:translateY(0px);
    }
}
/* MAIN CONTAINER */

.register-container{

    width:95%;

    max-width:1500px;

    min-height:92vh;

    display:flex;

    position:relative;

    background:
        rgba(15,23,42,0.78);

    backdrop-filter:blur(24px);

    border-radius:42px;

    overflow:hidden;

    border:1px solid
        rgba(255,255,255,0.08);

    box-shadow:

        0 30px 90px rgba(0,0,0,0.55),

        inset 0 1px 0 rgba(255,255,255,0.04);

    isolation:isolate;
}

.register-container::before{

    content:"";

    position:absolute;

    inset:0;

    padding:1px;

    border-radius:42px;

    background:
        linear-gradient(
            135deg,
            rgba(255,255,255,0.18),
            rgba(255,255,255,0.02)
        );

    -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);

    -webkit-mask-composite:xor;

    pointer-events:none;
}
/* LEFT SIDE */

.register-left{
    flex:1;

    padding:70px 50px;

    position:relative;

    overflow:hidden;

    border-right:
    1px solid rgba(255,255,255,0.08);    

    display:flex;
    flex-direction:column;
    justify-content:center;

    background:
    linear-gradient(
        180deg,
        #2563eb,
        #06b6d4
    );

    transition:all 0.5s ease;
}

.register-left::before{
    content:"";

    position:absolute;

    width:420px;
    height:420px;

    border-radius:50%;

    background:
    rgba(255,255,255,0.08);

    top:-120px;
    right:-120px;

    filter:blur(10px);
}

.register-left::after{
    content:"";

    position:absolute;

    width:300px;
    height:300px;

    backdrop-filter:blur(20px);

    border-radius:50%;

    background:
    rgba(255,255,255,0.05);

    bottom:-100px;
    left:-100px;
}

.register-left h1{

    font-size:68px;

    line-height:0.95;

    margin-bottom:32px;

    font-weight:800;

    letter-spacing:-2px;
}

.register-left p{

    font-size:18px;

    line-height:1.9;

    color:#cbd5e1;

    max-width:420px;
}

/* RIGHT SIDE */

.register-right{

    width:66%;

    padding:60px 65px;

    position:relative;

    overflow-y:auto;
}

.register-right::-webkit-scrollbar{

    width:10px;
}

.register-right::-webkit-scrollbar-track{

    background:transparent;
}

.register-right::-webkit-scrollbar-thumb{

    background:
        rgba(255,255,255,0.12);

    border-radius:20px;
}

.register-right::-webkit-scrollbar-thumb:hover{

    background:
        rgba(255,255,255,0.22);
}

.register-top{

    text-align:center;

    margin-bottom:45px;
}

.register-top h1{

    font-size:54px;

    line-height:1;

    margin-bottom:14px;

    font-weight:800;

    letter-spacing:-1.5px;

    background:
        linear-gradient(
            to right,
            #ffffff,
            #06b6d4
        );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.register-top p{

    color:#94a3b8;

    font-size:17px;

    letter-spacing:0.3px;
}

/* ROLE BUTTONS */

.role-btn{

    flex:1;

    height:64px;

    border:none;

    border-radius:18px;

    background:
        rgba(255,255,255,0.04);

    border:
        1px solid rgba(255,255,255,0.08);

    color:#cbd5e1;

    font-size:16px;

    font-weight:700;

    cursor:pointer;

    transition:0.35s ease;

    backdrop-filter:blur(12px);

    position:relative;

    overflow:hidden;
}

.role-btn::before{

    content:"";

    position:absolute;

    inset:0;

    background:
        linear-gradient(
            120deg,
            transparent,
            rgba(255,255,255,0.08),
            transparent
        );

    transform:translateX(-100%);

    transition:0.6s ease;
}

.role-btn:hover::before{

    transform:translateX(100%);
}

.role-btn:hover{

    transform:
        translateY(-3px)
        scale(1.01);

    border-color:
        rgba(6,182,212,0.4);
}
/* ROLE BUTTON WRAPPER */

.role-buttons{

    display:flex;

    gap:14px;

    margin-bottom:32px;

    background:
    rgba(255,255,255,0.03);

    padding:10px;

    border-radius:22px;

    border:
    1px solid rgba(255,255,255,0.05);

    backdrop-filter:blur(10px);
}

/* FORM */

.form-grid{

    display:grid;

    grid-template-columns:
        repeat(2,1fr);

    gap:24px;
}

.main-student-form,
.main-alumni-form{

    background:
        rgba(255,255,255,0.02);

    border:
        1px solid rgba(255,255,255,0.05);

    border-radius:30px;

    padding:35px;

    backdrop-filter:blur(12px);
}

/* UPLOAD */

.upload-box{

    width:100%;

    height:82px;

    display:flex;

    justify-content:center;

    align-items:center;

    border-radius:22px;

    border:2px dashed rgba(255,255,255,0.14);

    background:#071226;

    cursor:pointer;

    transition:0.3s ease;

    font-size:17px;

    color:#cbd5e1;
}


.upload-box:hover{
    border-color:#06b6d4;
}

/* BUTTON */

.submit-btn{

    width:100%;

    height:64px;

    margin-top:30px;

    border:none;

    border-radius:20px;

    position:relative;

    overflow:hidden;

    background:
        linear-gradient(
            135deg,
            #06b6d4,
            #4f46e5,
            #7c3aed
        );

    background-size:200% 200%;

    animation:
        gradientMove 5s ease infinite;

    color:white;

    font-size:18px;

    font-weight:700;

    cursor:pointer;

    transition:
        0.35s ease;
}

.submit-btn:hover{

    transform:
    translateY(-5px)
    scale(1.01);

    filter:brightness(1.08);

    box-shadow:
    0 18px 40px rgba(6,182,212,0.35);
}

.submit-btn::before{

    content:"";

    position:absolute;

    top:0;
    left:-120%;

    width:80%;
    height:100%;

    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,0.25),
            transparent
        );

    transform:skewX(-20deg);

    transition:0.7s ease;
}

.submit-btn:hover::before{

    left:130%;
}
/* ALUMNI BUTTON */

.main-alumni-form .submit-btn{

    background:
    linear-gradient(
        to right,
        #7c3aed,
        #a855f7
    );

    box-shadow:
    0 10px 25px rgba(124,58,237,0.25);
}

/* ALUMNI BUTTON HOVER */

.main-alumni-form .submit-btn:hover{

    box-shadow:
    0 14px 35px rgba(124,58,237,0.4);
}

.submit-btn:hover{
    transform:translateY(-5px);
}

/* FORM SWITCH */

.main-student-form,
.main-alumni-form{
    display:none;
}

.active-form{
    display:block;
}

/* MOBILE */

@media(max-width:1100px){

    .register-container{
        flex-direction:column;
    }

    .register-left,
    .register-right{
        width:100%;
    }

    .register-left{
        padding:50px 30px;
    }

    .register-left h1{
        font-size:50px;
    }

    .register-right{
        padding:40px 25px;
    }

    .form-grid{
        grid-template-columns:1fr;
    }
}

</style>

</head>

<body>

<div class="theme-transition"></div>

<!-- BACKGROUND GLOWS -->

<div class="bg-orb orb1"></div>

<div class="bg-orb orb2"></div>

<div class="bg-orb orb3"></div>

<section class="register-page">

<div class="register-container">

    <!-- LEFT SIDE -->

    <div class="register-left">

            <h1 id="leftTitle">
                Start Building <br> Your Career
            </h1>

            <p id="leftText">
                Connect with mentors,
                discover internships,
                and grow your skills.
            </p>

        <div class="left-stats">

            <div class="left-stat">
                <h2>15K+</h2>
                <p>Students</p>
            </div>

            <div class="left-stat">
                <h2>2K+</h2>
                <p>Alumni</p>
            </div>

            <div class="left-stat">
                <h2>500+</h2>
                <p>Mentors</p>
            </div>

        </div>            

    </div>

    <!-- RIGHT SIDE -->

    <div class="register-right">

    <div class="register-nav">

        <a href="index.html" class="back-home">
            ← Back to Home
        </a>

        <div class="secure-badge">
            Secure Registration
        </div>

    </div>        

        <div class="register-top">

            <h1>Create Your Account</h1>

            <p>Join GBPUAT Alumni Network</p>

        </div>

        <!-- ROLE BUTTONS -->

        <div class="role-buttons">

        <button
            id="studentBtn"
            class="role-btn"
            type="button"
        >
            Student
        </button>

        <button
            id="alumniBtn"
            class="role-btn"
            type="button"
        >
            Alumni
        </button>

        </div>

        <!-- STUDENT FORM -->

        <form id="studentRegisterForm"
            class="main-student-form active-form"
            autocomplete="off">

            <div class="form-grid">

                <!-- FULL NAME -->

                <div class="field">

                    <input
                        type="text"
                        id="studentName"
                        required
                    >

                    <label>Full Name</label>

                </div>

                <!-- EMAIL -->

                <div class="field">

                    <input
                        type="email"
                        id="studentEmail"
                        required
                    >

                    <label>Email Address</label>

                </div>

                <!-- PHONE -->

                <div class="field">

                    <input
                        type="text"
                        id="studentPhone"
                        required
                    >

                    <label>Phone Number</label>

                </div>

                <!-- PASSWORD -->

                <div class="field password-field">

                    <input
                        type="password"
                        id="studentPassword"
                        required
                    >

                    <span class="toggle-password">
                        <i class="fa-solid fa-eye"></i>
                    </span>                    

                    <label>Password</label>

                </div>

                <!-- CONFIRM PASSWORD -->

                <div class="field">

                    <input type="password" required>

                    <span class="toggle-password">
                        <i class="fa-solid fa-eye"></i>
                    </span>

                    <label>Confirm Password</label>

                </div>                

                <!-- SKILLS -->

                <div class="field">

                    <input
                        type="text"
                        id="studentSkills"
                        required
                    >

                    <label>Skills</label>

                </div>

                <!-- COLLEGE -->

                <div class="field">

                    <select
                        id="studentCollege"
                        required
                    >

                        <option value="" disabled selected></option>

                        <option value="technology">
                            College of Technology
                        </option>

                        <option value="agriculture">
                            College of Agriculture
                        </option>

                        <option value="veterinary">
                            College of Veterinary and Animal Sciences
                        </option>

                        <option value="agribusiness">
                            College of Agribusiness Management
                        </option>

                        <option value="basic">
                            College of Basic Sciences and Humanities
                        </option>

                        <option value="community">
                            College of Community Science
                        </option>

                        <option value="pg">
                            College of Post-Graduate Studies
                        </option>

                        <option value="fisheries">
                            College of Fisheries
                        </option>

                    </select>

                    <label>Select College</label>

                </div>

                <!-- DEPARTMENT -->

                <div class="field">

                    <select
                        id="studentDepartment"
                        required
                    >

                        <option value="" disabled selected></option>

                    </select>

                    <label>Select Department</label>

                </div>

                <!-- YEAR -->

                <div class="field">

                    <select required>

                        <option value="" disabled selected></option>

                        <option value="1st">1st Year</option>

                        <option value="2nd">2nd Year</option>

                        <option value="3rd">3rd Year</option>

                        <option value="4th">4th Year</option>

                    </select>

                    <label>Select Year</label>

                </div>

                <!-- LINKEDIN -->

                <div class="field">

                    <input
                        type="text"
                        required
                    >

                    <label>LinkedIn Profile</label>

                </div>

                <!-- PROFILE UPLOAD -->

                <div class="upload-field">

                    <div class="upload-box">

                        <input
                            type="file"
                            id="profileUpload"
                            accept="image/*"
                            hidden
                        >

                        <div
                            class="upload-content"
                            id="uploadTrigger"
                        >

                            <img id="previewImage">

                            <span id="uploadText">

                                Upload Profile Photo

                            </span>

                        </div>

                        <button
                            type="button"
                            id="removeImage"
                        >
                            ×
                        </button>

                    </div>

                </div>

            </div>

            <button type="submit"
                    class="submit-btn">

                Register as Student

            </button>

        </form>

        <!-- ALUMNI FORM -->

        <form id="alumniRegisterForm"
            class="main-alumni-form"
            autocomplete="off">

            <div class="form-grid">

                <!-- FULL NAME -->

                <div class="field">

                    <input type="text" required>

                    <label>Full Name</label>

                </div>

                <!-- PASSING YEAR -->

                <div class="field">

                    <input type="text" required>

                    <label>Passing Year</label>

                </div>

                <!-- EMAIL -->

                <div class="field">

                    <input type="email" required>

                    <label>Email Address</label>

                </div>

                <!-- PHONE -->

                <div class="field">

                    <input type="text" required>

                    <label>Phone Number</label>

                </div>

                <!-- PASSWORD -->

                <div class="field password-field">

                    <input
                        type="password"
                        id="alumniPassword"
                        required
                    >

                    <span class="toggle-password">
                        <i class="fa-solid fa-eye"></i>
                    </span>

                    <label>Password</label>

                </div>

                <!-- CONFIRM PASSWORD -->

                <div class="field">

                    <input type="password" required>

                    <span class="toggle-password">
                        <i class="fa-solid fa-eye"></i>
                    </span>

                    <label>Confirm Password</label>

                </div>

                <!-- COLLEGE -->

                <div class="field">

                    <select
                        id="alumniCollege"
                        required
                    >

                        <option value="" disabled selected></option>

                        <option value="technology">
                            College of Technology
                        </option>

                        <option value="agriculture">
                            College of Agriculture
                        </option>

                        <option value="veterinary">
                            College of Veterinary and Animal Sciences
                        </option>

                        <option value="agribusiness">
                            College of Agribusiness Management
                        </option>

                        <option value="basic">
                            College of Basic Sciences and Humanities
                        </option>

                        <option value="community">
                            College of Community Science
                        </option>

                        <option value="pg">
                            College of Post-Graduate Studies
                        </option>

                        <option value="fisheries">
                            College of Fisheries
                        </option>

                    </select>

                    <label>Select College</label>

                </div>

                <!-- DEPARTMENT -->

                <div class="field">

                    <select
                        id="alumniDepartment"
                        required
                    >

                        <option value="" disabled selected></option>

                    </select>

                    <label>Select Department</label>

                </div>

                <!-- COMPANY -->

                <div class="field">

                    <input type="text" required>

                    <label>Company Name</label>

                </div>

                <!-- POSITION -->

                <div class="field">

                    <input type="text" required>

                    <label>Current Position</label>

                </div>

                <!-- DOMAIN -->

                <div class="field">

                    <input type="text" required>

                    <label>Domain</label>

                </div>

                <!-- LINKEDIN -->

                <div class="field">

                    <input type="text" required>

                    <label>LinkedIn Profile</label>

                </div>

            </div>

            <button type="submit" class="submit-btn">

                Register as Alumni

            </button>

        </form>
    </div>

    

</div>

</section>

<script src="script.js"></script>



</body>

</html>
