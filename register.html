<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | GBPUAT Connect</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    
    margin:0;
    padding:35px;

    font-family:'Poppins',sans-serif;

    background:#020617;

    color:white;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow-y:auto;

    overflow-x:hidden;
}

/* MAIN CONTAINER */

.register-container{
    width:92%;
    max-width:1450px;
    min-height:92vh;

    display:flex;

    background:
        rgba(15,23,42,0.82);

    backdrop-filter:blur(18px);

    border-radius:40px;

    overflow:hidden;

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:
        0 25px 80px rgba(0,0,0,0.55);

    margin:auto;
}

/* LEFT SIDE */

.register-left{
    width:32%;

    padding:70px 40px;

    background:
        linear-gradient(
            180deg,
            #4f46e5,
            #06b6d4
        );

    display:flex;
    flex-direction:column;
    justify-content:center;
}

.register-left h1{
    font-size:62px;
    line-height:1;
    margin-bottom:28px;
    font-weight:800;
}

.register-left p{
    font-size:18px;
    line-height:1.7;
    color:#e2e8f0;
}

/* RIGHT SIDE */

.register-right{
    width:68%;

    padding:50px 55px;
}

.register-top{
    text-align:center;
    margin-bottom:35px;
}

.register-top h1{
    font-size:46px;
    line-height:1.1;
    margin-bottom:10px;
}

.register-top p{
    color:#94a3b8;
    font-size:16px;
}

/* ROLE BUTTONS */

.role-buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:40px;
}

.role-buttons button{
    padding:12px 32px;

    border:none;

    border-radius:14px;

    background:#1e293b;

    color:white;

    font-size:15px;

    font-weight:600;

    transition:0.3s ease;
}

.role-buttons button:hover{
    transform:translateY(-4px);
}

.active-role{
    background:
        linear-gradient(
            to right,
            #06b6d4,
            #4f46e5
        ) !important;
}

/* FORM */

.form-grid{
    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:18px;
}

.form-grid input,
.form-grid select{

    width:100%;

    height:54px;

    padding:0 16px;

    border-radius:16px;

    border:1px solid rgba(255,255,255,0.08);

    background:#0f172a;

    color:white;

    font-size:15px;

    outline:none;

    transition:0.3s ease;
}

.form-grid input:focus,
.form-grid select:focus{

    border-color:#06b6d4;

    box-shadow:
        0 0 20px rgba(6,182,212,0.25);
}

/* UPLOAD */

.upload-box{
    height:54px;

    display:flex;
    justify-content:center;
    align-items:center;

    border-radius:16px;

    border:2px dashed rgba(255,255,255,0.15);

    background:#0f172a;

    cursor:pointer;

    transition:0.3s ease;

    font-size:15px;
}

.upload-box:hover{
    border-color:#06b6d4;
}

/* BUTTON */

.submit-btn{
    width:100%;

    height:58px;

    margin-top:28px;

    border:none;

    border-radius:18px;

    background:
        linear-gradient(
            to right,
            #06b6d4,
            #4f46e5
        );

    color:white;

    font-size:18px;

    font-weight:700;

    cursor:pointer;

    transition:0.3s ease;
}

.submit-btn:hover{
    transform:translateY(-5px);
}

/* FORM SWITCH */

.main-student-form,
.main-alumni-form{
    display:none;
}

.active-form{
    display:block;
}

/* MOBILE */

@media(max-width:1100px){

    .register-container{
        flex-direction:column;
    }

    .register-left,
    .register-right{
        width:100%;
    }

    .register-left{
        padding:50px 30px;
    }

    .register-left h1{
        font-size:50px;
    }

    .register-right{
        padding:40px 25px;
    }

    .form-grid{
        grid-template-columns:1fr;
    }
}

</style>

</head>

<body>

<div class="theme-transition"></div>

<section class="register-page">

<div class="register-container">

    <!-- LEFT SIDE -->

    <div class="register-left">

            <h1 id="leftTitle">
                Start Building <br> Your Career
            </h1>

            <p id="leftText">
                Connect with mentors,
                discover internships,
                and grow your skills.
            </p>

    </div>

    <!-- RIGHT SIDE -->

    <div class="register-right">

        <div class="register-top">

            <h1>Create Your Account</h1>

            <p>Join GBPUAT Alumni Network</p>

        </div>

        <!-- ROLE BUTTONS -->

        <div class="role-buttons">

            <button id="studentBtn" type="button">
                Student
            </button>

            <button id="alumniBtn" type="button">
                Alumni
            </button>

        </div>

        <!-- STUDENT FORM -->

        <form id="studentRegisterForm"
              class="main-student-form active-form"
              autocomplete="off">

            <div class="form-grid">

                <input type="text"
                       id="studentName"
                       placeholder="Full Name">

                <input type="email"
                       id="studentEmail"
                       placeholder="Email Address">

                <input type="text"
                       id="studentPhone"
                       placeholder="Phone Number">

                <input type="password"
                       id="studentPassword"
                       placeholder="Password">

                <select id="studentDepartment">
                    <option value="">Select Department</option>
                </select>

                <input type="text"
                       id="studentSkills"
                       placeholder="Skills">

                <select id="studentCollege">
                    <option value="">Select College</option>
                    <option value="technology">College of Technology</option>
                    <option value="agriculture">College of Agriculture</option>
                    <option value="veterinary">College of Veterinary and Animal Sciences</option>
                    <option value="agribusiness">College of Agribusiness Management</option>
                    <option value="basic">College of Basic Sciences and Humanities</option>
                    <option value="community">College of Community Science</option>
                    <option value="pg">College of Post-Graduate Studies</option>
                    <option value="fisheries">College of Fisheries</option>
                </select>

                <input type="text" placeholder="Semester">

                <input type="text" placeholder="LinkedIn Profile">

                <div class="profile-upload-container">

                    <label class="upload-box">

                        <input
                            type="file"
                            id="profileUpload"
                            accept="image/*"
                            hidden
                        >

                        <span id="uploadText">
                            Upload Profile Photo
                        </span>

                    </label>

                    <img id="previewImage">

                </div>
            </div>

            <button type="submit" class="submit-btn">
                Register as Student
            </button>

        </form>

        <!-- ALUMNI FORM -->

        <form id="alumniRegisterForm"
              class="main-alumni-form"
              autocomplete="off">

            <div class="form-grid">

                <div class="input-box">

                    <input type="text" required>

                    <label>Full Name</label>

                </div>

                <input type="text" placeholder="Passing Year">

                <input type="email" placeholder="Email Address">

                <input type="text" placeholder="Phone Number">

                <input type="password" placeholder="Password">

                <input type="password" placeholder="Confirm Password">

                <select id="alumniCollege">
                    <option value="">Select College</option>
                    <option value="technology">College of Technology</option>
                    <option value="agriculture">College of Agriculture</option>
                    <option value="veterinary">College of Veterinary and Animal Sciences</option>
                    <option value="agribusiness">College of Agribusiness Management</option>
                    <option value="basic">College of Basic Sciences and Humanities</option>
                    <option value="community">College of Community Science</option>
                    <option value="pg">College of Post-Graduate Studies</option>
                    <option value="fisheries">College of Fisheries</option>
                </select>

                <select id="alumniDepartment">
                    <option value="">Select Department</option>
                </select>

                <input type="text" placeholder="Company Name">

                <input type="text" placeholder="Current Position">

                <input type="text" placeholder="Domain">

                <input type="text" placeholder="LinkedIn Profile">

            </div>

            <button type="submit" class="submit-btn">
                Register as Alumni
            </button>

        </form>

    </div>

</div>

</section>

<script src="script.js"></script>

</body>

</html>
